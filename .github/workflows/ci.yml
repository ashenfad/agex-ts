name: CI

on:
  push:
    branches: [main, init, nxt]
  pull_request:

# Cancel an in-flight run for the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node tests (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so cross-package type imports resolve via the
      # `dist/*.d.ts` paths declared in each package's `exports` map
      # (e.g. `termish-ts` importing `kvgit-ts`).
      - name: Build
        run: pnpm build

      # Scan every package's `dist/` for browser-hostile patterns
      # (`createRequire`, `node:module`, `worker_threads`, etc.) that
      # leak into bundles consumed by browser apps. See
      # `scripts/check-dist-shape.mjs` for the rules + per-package
      # allowlist.
      - name: Bundle-shape check
        run: pnpm check:dist

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (Node + fake-indexeddb)
        run: pnpm test

  browser:
    name: Browser tests (real IndexedDB + Web Worker runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (with system deps)
        run: pnpm --filter kvgit-ts exec playwright install chromium --with-deps

      - name: kvgit-ts (Chromium + real IndexedDB)
        run: pnpm --filter kvgit-ts test:browser

      # agex-runtime-worker tests import from `agex-ts/types` and
      # `agex-ts/errors`, which are sub-path exports resolved out of
      # the built `dist/`. The Node lane builds the whole workspace;
      # the browser lane is its own job and has to build the
      # upstream graph explicitly. The trailing `...` in the filter
      # tells pnpm to build the package *and* every workspace
      # dependency it transitively needs (kvgit-ts, termish-ts —
      # without these, agex-ts's own build fails to resolve them).
      - name: Build agex-ts and its deps (for runtime-worker tests)
        run: pnpm --filter "agex-ts..." build

      - name: agex-runtime-worker (Web Worker smoke)
        run: pnpm --filter agex-runtime-worker test:browser
