packages:
  - "packages/*"

# Postinstall scripts pnpm 11+ requires explicit approval for.
# These tools download platform-specific native binaries via
# postinstall — required for normal operation.
allowBuilds:
  '@biomejs/biome': true
  esbuild: true
  # msw is a transitive dep of @vitest/browser. Its postinstall prints a
  # one-time setup message and is otherwise inert; allow it to clear
  # pnpm's "ignored builds" gate.
  msw: true
